# Sync this fork with tristinbaker/IdleFantasy and build a debug APK when upstream moved.
#
# Requires: fork default branch "main", write permission for GITHUB_TOKEN (contents: write).
# On merge conflicts the job fails — resolve manually, then re-run workflow_dispatch.
name: Upstream Sync

on:
  schedule:
    # Daily 07:00 UTC — upstream often ships in the evening US time
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: upstream-sync-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  # Required for `gh workflow run upstream-release.yml` after a successful sync.
  # Pushes made with GITHUB_TOKEN do not trigger other workflows on their own.
  actions: write

jobs:
  sync-and-build:
    name: Sync upstream, test, build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync with remote main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Record HEAD before sync
        id: before
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Sync fork with upstream
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: tristinbaker/IdleFantasy
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          test_mode: false
          # Avoid false "No new commits" when histories diverged longer than
          # the action's default shallow window.
          shallow_since: "2000-01-01T00:00:00Z"

      - name: Detect new commits
        id: changes
        run: |
          AFTER="$(git rev-parse HEAD)"
          BEFORE="${{ steps.before.outputs.sha }}"
          if [[ "$AFTER" != "$BEFORE" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Upstream sync brought new commits ($BEFORE -> $AFTER)"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date with upstream"
          fi

      - name: Open issue on sync failure
        if: failure() && steps.sync.outcome == 'failure'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Upstream sync failed — manual merge required";
            const body = [
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "Merge [tristinbaker/IdleFantasy](https://github.com/tristinbaker/IdleFantasy) into \`main\` locally, resolve conflicts, push, then re-run **Upstream Sync**.",
            ].join("\n");
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
            });
            if (!issues.some(i => i.title === title)) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }

      - name: Set up JDK 17
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        if: steps.changes.outputs.changed == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        if: steps.changes.outputs.changed == 'true'
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Assemble debug APK
        if: steps.changes.outputs.changed == 'true'
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: idle-fantasy-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Trigger upstream release workflow
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Upstream moved — checking whether a signed release is needed..."
          gh workflow run upstream-release.yml --ref main

      - name: Trigger Save Viewer sync (optional)
        if: steps.changes.outputs.changed == 'true' && vars.SAVE_VIEWER_SYNC_ENABLED == 'true'
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          GITEA_URL: ${{ vars.GITEA_URL }}
          GITEA_REPO: ${{ vars.GITEA_REPO }}
        run: |
          if [[ -z "$GITEA_TOKEN" || -z "$GITEA_URL" || -z "$GITEA_REPO" ]]; then
            echo "Save Viewer trigger skipped (set vars SAVE_VIEWER_SYNC_ENABLED, GITEA_URL, GITEA_REPO and secret GITEA_TOKEN)"
            exit 0
          fi
          curl -fsS -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            "${GITEA_URL}/api/v1/repos/${GITEA_REPO}/actions/workflows/sync-upstream.yml/dispatches" \
            -d '{"ref":"master","inputs":{"reason":"android-upstream-sync"}}'
